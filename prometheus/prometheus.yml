global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: redclaw-node-exporter
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: redclaw-model
    static_configs:
      - targets: ["127.0.0.1:8000"]

  - job_name: redclaw-zeroclaw
    static_configs:
      - targets: ["127.0.0.1:42617"]
