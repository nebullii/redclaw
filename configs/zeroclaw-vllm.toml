workspace_dir = "/opt/redclaw/workspace"
default_provider = "local"
default_model = "Qwen/Qwen2.5-7B-Instruct"

[providers]
fallback = "local"

[providers.models.local]
kind = "vllm"
base_url = "http://127.0.0.1:8000/v1"
model = "Qwen/Qwen2.5-7B-Instruct"

[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = []
non_cli_excluded_tools = ["shell", "browser", "browser_open", "http"]

[observability]
runtime_trace_mode = "rolling"
runtime_trace_path = "state/runtime-trace.jsonl"

[gateway]
host = "127.0.0.1"
port = 42617
